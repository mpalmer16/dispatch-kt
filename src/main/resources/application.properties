spring.application.name=dispatch-kt
server.port=8081
spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.listener.missing-topics-fatal=false
spring.kafka.consumer.group-id=dispatch-kt
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.enable-auto-commit=true
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.trusted.packages=dkt.dispatch.events
spring.kafka.consumer.properties.spring.json.value.default.type=dkt.dispatch.events.OrderCreatedEvent
spring.kafka.consumer.properties.spring.json.use.type.headers=false
logging.level.org.springframework.kafka=INFO
logging.level.org.apache.kafka=INFO
logging.level.dkt.dispatch=DEBUG
spring.datasource.url=jdbc:postgresql://localhost:5432/dispatch
spring.datasource.username=dispatch
spring.datasource.password=dispatch
spring.datasource.driver-class-name=org.postgresql.Driver
spring.sql.init.mode=never
logging.level.org.springframework.jdbc.core=DEBUG
logging.level.org.springframework.data.jdbc.core=DEBUG
logging.level.org.springframework.data.relational.core=DEBUG