spring.application.name=dispatch-kt
spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
spring.kafka.listener.missing-topics-fatal=false
spring.kafka.consumer.group-id=${KAFKA_CONSUMER_GROUP_ID:dispatch-kt}
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.enable-auto-commit=true
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.trusted.packages=dkt.dispatch.events
spring.kafka.consumer.properties.spring.json.value.default.type=dkt.dispatch.events.OrderCreatedEvent
spring.kafka.consumer.properties.spring.json.use.type.headers=false
logging.level.org.springframework.kafka=INFO
logging.level.org.apache.kafka=INFO
logging.level.dkt.dispatch=${APP_LOG_LEVEL:DEBUG}
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/dispatch}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:dispatch}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:dispatch}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.sql.init.mode=never
logging.level.org.springframework.jdbc.core=DEBUG
logging.level.org.springframework.data.jdbc.core=DEBUG
logging.level.org.springframework.data.relational.core=DEBUG
